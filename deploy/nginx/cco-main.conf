# 把主域名 gxysyz.cn / www.gxysyz.cn 反代到 CCO
# 替换原 /etc/nginx/sites-available/portfolio,HTTPS 证书复用已有的

server {
    if ($host = www.gxysyz.cn) {
        return 301 https://$host$request_uri;
    }
    if ($host = gxysyz.cn) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name gxysyz.cn www.gxysyz.cn;
    return 404;
}

server {
    listen 443 ssl http2;
    server_name gxysyz.cn www.gxysyz.cn;

    ssl_certificate /etc/letsencrypt/live/gxysyz.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gxysyz.cn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 2M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # 后端 V3 调用偶尔 60s+
        proxy_read_timeout 300s;
        proxy_connect_timeout 15s;
        proxy_send_timeout 60s;
    }
}
